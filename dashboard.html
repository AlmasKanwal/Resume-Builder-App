<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ResumeForge</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-content">
            <div class="logo">
                <span class="logo-icon">R</span>
                <span class="logo-text">ResumeForge</span>
            </div>
            <div class="nav-actions">
                <span id="user-name" class="user-name"></span>
                <button id="logout-btn" class="btn btn-secondary">Logout</button>
            </div>
        </div>
    </nav>
    
    <!-- Dashboard Content -->
    <div class="dashboard-container">
        <div class="dashboard-header">
            <div>
                <h1>All Resumes</h1>
                <p class="subtitle">Browse and manage resumes from all users</p>
            </div>
            <a href="create-resume.html" class="btn btn-primary">+ Create New Resume</a>
        </div>
        
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Search resumes...">
        </div>
        
        <div id="resumes-grid" class="resumes-grid">
            <!-- Resume cards will be dynamically added here -->
        </div>
        
        <div id="empty-state" class="empty-state" style="display: none;">
            <div class="empty-icon">📄</div>
            <h3>No Resumes Yet</h3>
            <p>Create your first resume to get started</p>
            <a href="create-resume.html" class="btn btn-primary">Create Resume</a>
        </div>
        
        <div id="loading" class="loading">Loading resumes...</div>
    </div>
    
    <script type="module" src="script.js"></script>
</body>
</html>
