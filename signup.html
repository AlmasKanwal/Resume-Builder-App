<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - ResumeForge</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">
                <span class="logo-icon">R</span>
                <span class="logo-text">ResumeForge</span>
            </div>
            <h2>Create Account</h2>
            <p class="auth-subtitle">Sign up to start building your resume</p>
            <form id="signup-form">
                <div class="form-group">
                    <label for="name"><i class="fa fa-user"></i> Full Name</label>
                    <input type="text" id="name" required placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label for="email"><i class="fa fa-envelope"></i> Email</label>
                    <input type="email" id="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="password"><i class="fa fa-lock"></i> Password</label>
                    <input type="password" id="password" required placeholder="Min 6 characters">
                </div>
                <div class="form-group">
                    <label for="confirm-password"><i class="fa fa-lock"></i> Confirm Password</label>
                    <input type="password" id="confirm-password" required placeholder="Re-enter password">
                </div>
                <div id="message" class="message"></div>
                <button type="submit" class="btn btn-primary btn-full"><i class="fa fa-user-plus"></i> Sign Up</button>
            </form>
            <p class="auth-footer">Already have an account? <a href="login.html">Login</a></p>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
